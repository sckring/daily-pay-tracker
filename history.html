<script>
const data = JSON.parse(localStorage.getItem("hourlyXP_v1")) || { jobs: [], misc: [], dayId: Date.now() };
const content = document.getElementById("content");

// Helper: check if entry is from today
function isToday(entry) {
  return entry.dayId && entry.dayId === data.dayId;
}

function showWeekly() {
  const weeks = {};

  [...data.jobs, ...data.misc].forEach(item => {
    const date = new Date(item.date || item.startTime);
    const monday = new Date(date);
    monday.setDate(date.getDate() - date.getDay() + 1);
    const key = monday.toISOString().slice(0,10);

    if (!weeks[key]) weeks[key] = { total: 0, items: [] };
    weeks[key].total += Number(item.earned || item.amount || 0);
    weeks[key].items.push(item);
  });

  renderGroups(weeks, "Week of");
}

function showMonthly() {
  const months = {};

  [...data.jobs, ...data.misc].forEach(item => {
    const date = new Date(item.date || item.startTime);
    const key = date.getFullYear() + "-" + (date.getMonth()+1);

    if (!months[key]) months[key] = { total: 0, items: [] };
    months[key].total += Number(item.earned || item.amount || 0);
    months[key].items.push(item);
  });

  renderGroups(months, "Month");
}

function renderGroups(groups, label) {
  content.innerHTML = Object.keys(groups)
    .sort((a,b)=>b.localeCompare(a))
    .map(key => {
      const g = groups[key];
      return `
        <div class="section">
          <div class="total">${label}: ${key} — $${g.total.toFixed(2)}</div>
          ${g.items.map(i => formatItem(i)).join("")}
        </div>
      `;
    }).join("");
}

function formatItem(i) {
  const highlight = isToday(i) ? 'style="background: rgba(20,241,217,0.15); padding: 6px; border-radius:6px;"' : '';
  if (i.job) {
    return `<div class="entry" ${highlight}>${i.job}: $${Number(i.earned || 0).toFixed(2)}</div>`;
  }
  return `<div class="entry" ${highlight}>${i.label}: +$${Number(i.amount || 0).toFixed(2)}</div>`;
}

// Default view
showWeekly();
</script>
